<!DOCTYPE html>
<html lang="ko">
<head>

        .container { padding: 20px; max-width: 1000px; margin: auto; background: #fff; }
        .jumbotron { background: #e2e2e2; padding: 40px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        footer { text-align: center; padding: 20px; background: #333; color: #fff; margin-top: 20px; }

<body>

<header>

<nav>
