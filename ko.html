<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밴쿠버 K-League | 공식 홈페이지</title>
    <style>
        /* 동일한 스타일 적용 */
        body { font-family: 'Arial', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #003366; color: #ffffff; padding: 1.5rem; text-align: center; position: relative; }
        .lang-switch { position: absolute; top: 10px; right: 20px; }
        .lang-switch a { color: white; text-decoration: none; font-size: 0.9rem; border: 1px solid white; padding: 3px 8px; border-radius: 3px; }
        nav { background: #333; color: #fff; padding: 0.5rem; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 20px; max-width: 1000px; margin: auto; background: #fff; min-height: 600px; }
        .jumbotron { background: #e2e2e2; padding: 40px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        footer { text-align: center; padding: 20px; background: #333; color: #fff; margin-top: 20px; }
        table { width:100%; border-collapse: collapse; text-align: center; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        th { background: #eee; }
    </style>
</head>
<body>

<header>
    <div class="lang-switch">
        <a href="ko.html">KO</a> | <a href="index.html">EN</a>
    </div>
    <h1>Vancouver K-League</h1>
    <p>밴쿠버 최초의 한인 사회인 야구 리그</p>
</header>

<nav>
    <a href="ko.html">홈</a>
    <a href="#">경기일정</a>
    <a href="#">리그순위</a>
    <a href="#">기록실</a>
</nav>

<div class="container">
    <div class="jumbotron">
        <h2>2026 시즌 준비 중!</h2>
        <p>총 6개 팀, 정규시즌 및 플레이오프 40경기의 대장정</p>
    </div>

    <div class="card">
        <h3>🏆 리그 순위 (Standings)</h3>
        <table id="standings-table-ko">
            <thead>
                <tr>
                    <th>순위</th><th>팀명</th><th>경기</th><th>승</th><th>패</th><th>승률</th>
                </tr>
            </thead>
            <tbody id="standings-body-ko">
            </tbody>
        </table>
    </div>
</div>

<footer>
    <p>&copy; 2026 Vancouver K-League. All Rights Reserved.</p>
</footer>

<script>
    const sheetId = '1TGVBZmql3c0jwu1DPGLH3fzqU5m3IjqCVuD2XX2i1zc';
    const sheetName = encodeURIComponent('Standings(순위)');
    const sheetUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${sheetName}`;

    fetch(sheetUrl)
        .then(res => res.text())
        .then(data => {
            const json = JSON.parse(data.substr(47).slice(0, -2));
            const rows = json.table.rows;
            const tbody = document.getElementById('standings-body-ko');
            rows.forEach(row => {
                const tr = document.createElement('tr');
                row.c.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell ? (cell.v || '') : '';
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        });
</script>
</body>
</html>
