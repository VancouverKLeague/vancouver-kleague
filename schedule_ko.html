<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밴쿠버 K-League | 전체 일정 및 대진표</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #003366; color: #ffffff; padding: 1.5rem; text-align: center; }
        nav { background: #333; color: #fff; padding: 0.5rem; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 20px; max-width: 1000px; margin: auto; background: #fff; min-height: 800px; }
        table { width:100%; border-collapse: collapse; text-align: center; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px 8px; font-size: 0.9rem; }
        th { background: #f8f9fa; font-weight: bold; }
        
        /* 포스트시즌 단계별 배지 스타일 */
        .po-badge { display: inline-block; padding: 3px 10px; border-radius: 15px; font-size: 0.7rem; font-weight: bold; color: white; margin-right: 8px; vertical-align: middle; text-transform: uppercase; }
        .badge-wc { background-color: #0288d1; } /* 와일드카드: 파란색 */
        .badge-sf { background-color: #ef6c00; } /* 준결승: 주황색 */
        .badge-final { background-color: #d32f2f; } /* 결승전: 빨간색 */
        .badge-3rd { background-color: #607d8b; } /* 3-4위전: 회색 */
        .badge-default { background-color: #555; }

        /* 정규시즌 시드 순위 배지 */
        .seed-badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.75rem; color: white; margin-right: 5px; font-weight: bold; }
        
        footer { text-align: center; padding: 30px; background: #333; color: #fff; margin-top: 20px; }
        .loading { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

<header>
    <h1>Vancouver K-League</h1>
    <p>2026 시즌 전체 일정 및 포스트시즌 대진</p>
</header>

<nav><a href="ko.html">← 홈으로 돌아가기</a></nav>

<div class="container">
    <h3>⚾ 전체 경기 일정 및 토너먼트 안내</h3>
    <div id="loading-msg" class="loading">데이터를 불러오는 중...</div>
    <table id="full-table" style="display:none;">
        <thead>
            <tr><th>날짜 & 시간</th><th>구장</th><th>대진 (Matchup)</th><th>결과</th></tr>
        </thead>
        <tbody id="full-schedule-body"></tbody>
    </table>
</div>

<script>
    const sheetId = '1TGVBZmql3c0jwu1DPGLH3fzqU5m3IjqCVuD2XX2i1zc';
    const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent('Schedule(일정)')}`;

    function formatTeamName(name) {
        if (!name) return '';
        return name.replace(/\[(.*?)\]/g, (match, p1) => {
            let color = '#78909c'; 
            if (p1.includes('1')) color = '#D4AF37'; 
            if (p1.includes('2')) color = '#A9A9A9'; 
            if (p1.includes('3')) color = '#CD7F32'; 
            return `<span class="seed-badge" style="background:${color}">${p1}</span>`;
        });
    }

    fetch(url).then(r => r.text()).then(d => {
        const json = JSON.parse(d.substr(47).slice(0, -2));
        const rows = json.table.rows;
        const tbody = document.getElementById('full-schedule-body');
        
        rows.forEach(row => {
            const c = row.c;
            if (!c[3]) return;

            const tr = document.createElement('tr');
            const note = c[6] ? (c[6].f || c[6].v || '') : '';
            const noteUpper = note.toUpperCase();

            if (note.trim().length > 0) tr.style.backgroundColor = '#fffdec';

            let badgeClass = 'badge-default';
            if (noteUpper.includes('WILD') || noteUpper.includes('WC') || note.includes('와일드')) {
                badgeClass = 'badge-wc';
            } else if (noteUpper.includes('SF') || noteUpper.includes('SEMI') || note.includes('준결승')) {
                badgeClass = 'badge-sf';
            } else if (noteUpper.includes('FINAL') || note.includes('결승')) {
                badgeClass = 'badge-final';
            } else if (noteUpper.includes('3RD') || note.includes('3-4위')) {
                badgeClass = 'badge-3rd';
            }

            const awayTeam = formatTeamName(c[3] ? (c[3].f || c[3].v) : '');
            const homeTeam = formatTeamName(c[4] ? (c[4].f || c[4].v) : '');
            
            // 항상 Away / Home 표시 (배지가 있으면 맨 앞에 붙임)
            const matchupHTML = `
                <div style="display:flex; justify-content:center; align-items:center; flex-wrap:wrap; gap:6px;">
                    ${note ? `<span class="po-badge ${badgeClass}">${note}</span>` : ''}
                    <span><span style="font-size:0.65rem; font-weight:normal; color:#666; border:1px solid #ccc; border-radius:3px; padding:1px 3px; margin-right:4px;">Away</span><strong>${awayTeam}</strong></span>
                    <span style="font-size:0.8rem; font-weight:normal; color:#aaa;">vs</span>
                    <span><span style="font-size:0.65rem; font-weight:normal; color:#d32f2f; border:1px solid #d32f2f; border-radius:3px; padding:1px 3px; margin-right:4px;">Home</span><strong style="color:#003366;">${homeTeam}</strong></span>
                </div>`;

            tr.innerHTML = `
                <td style="width:20%; font-size:0.8rem; vertical-align:middle;">${c[0]?(c[0].f||c[0].v):''}<br><span style="color:#888;">${c[1]?(c[1].f||c[1].v):''}</span></td>
                <td style="width:20%; font-size:0.8rem; vertical-align:middle;">${c[2]?(c[2].f||c[2].v):''}</td>
                <td style="width:48%; text-align:center; vertical-align:middle;">
                    ${matchupHTML}
                </td>
                <td style="width:12%; color:red; font-weight:bold; vertical-align:middle;">${c[5]?(c[5].f||c[5].v):'-'}</td>
            `;
            tbody.appendChild(tr);
        });
        
        document.getElementById('loading-msg').style.display = 'none';
        document.getElementById('full-table').style.display = 'table';
    });
</script>

</body>
</html>
