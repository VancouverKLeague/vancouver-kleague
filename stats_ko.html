<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>밴쿠버 K-League | 전체 기록실</title>
    <style>
        body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #003366; color: #ffffff; padding: 1.5rem; text-align: center; }
        nav { background: #333; color: #fff; padding: 10px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 15px; max-width: 1200px; margin: auto; background: #fff; min-height: 100vh; }
        
        /* 컨트롤 패널 스타일 */
        .controls { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
        .btn-group { display: flex; gap: 2px; }
        select, button, #search-input { padding: 8px 12px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        button.active { background: #003366; color: white; border-color: #003366; }
        button.inactive { background: white; color: #333; }
        #search-input { cursor: text; font-weight: normal; }

        /* 표 가로 스크롤 및 고정 열 디자인 */
        .stats-scroll-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        
        .player-info-sticky { position: sticky; left: 0; z-index: 5; background-color: #ffffff !important; box-shadow: 2px 0 5px rgba(0,0,0,0.1); width: 180px !important; min-width: 180px; padding-left: 10px !important; }
        th.player-info-sticky { z-index: 11; background-color: #f8f9fa !important; }

        td, th { white-space: nowrap; padding: 12px 8px; border: 1px solid #eee; text-align: center; font-size: 0.85rem; }
        th { background: #f8f9fa; cursor: pointer; }
        .val-highlight { color: #d32f2f; font-weight: bold; background-color: #fff9f9; }
        
        .player-info { display: flex; flex-direction: column; text-align: left; }
        .p-name { font-weight: bold; color: #003366; }
        .p-team { font-size: 0.7rem; color: #888; }
        .rank-tag { font-size: 0.7rem; color: #d32f2f; font-weight: 900; background: #ffeeee; padding: 1px 4px; border-radius: 4px; margin-right: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Vancouver K-League Stats</h1>
    <p>리그 전체 선수 기록실</p>
</header>

<nav>
    <a href="ko.html">홈으로</a>
    <a href="schedule_ko.html">전체 일정</a>
</nav>

<div class="container">
    <div class="controls">
        <select id="year-select" onchange="changeYear(this.value)">
            <option value="2026" selected>2026 시즌</option>
            <option value="2025">2025 시즌</option>
        </select>

        <div class="btn-group">
            <button id="btn-Reg" class="active" onclick="switchSeason('Reg')">정규 시즌</button>
            <button id="btn-Post" class="inactive" onclick="switchSeason('Post')">포스트 시즌</button>
        </div>
        <div class="btn-group">
            <button id="btn-Hitter" class="active" onclick="switchCategory('Hitter')">타자 기록</button>
            <button id="btn-Pitcher" class="inactive" onclick="switchCategory('Pitcher')">투수 기록</button>
        </div>
        <input type="text" id="search-input" placeholder="선수 이름 검색..." onkeyup="filterTable()">
    </div>

    <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">
        * <strong>공식 순위</strong>: 게임체인저 규정 타석/이닝을 충족한 선수가 상단에 노출됩니다. (0승 투수는 다승 순위에서 제외)<br>
        * 항목 제목을 클릭하면 정렬 기준이 바뀝니다.
    </p>

    <div class="stats-scroll-container">
        <table id="stats-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const sheetId = '1TGVBZmql3c0jwu1DPGLH3fzqU5m3IjqCVuD2XX2i1zc';
    let currentYear = '2026';
    let currentSeason = 'Reg';
    let currentCategory = 'Hitter';
    let allData = [];
    let sortColIdx = 0; 
    let sortOrder = -1; 

    function changeYear(y) {
        currentYear = y;
        loadData();
    }

    function switchSeason(s) {
        currentSeason = s;
        document.getElementById('btn-Reg').className = (s === 'Reg' ? 'active' : 'inactive');
        document.getElementById('btn-Post').className = (s === 'Post' ? 'active' : 'inactive');
        loadData();
    }

    function switchCategory(c) {
        currentCategory = c;
        sortColIdx = 0; 
        sortOrder = (c === 'Pitcher') ? 1 : -1;
        document.getElementById('btn-Hitter').className = (c === 'Hitter' ? 'active' : 'inactive');
        document.getElementById('btn-Pitcher').className = (c === 'Pitcher' ? 'active' : 'inactive');
        renderTable();
    }

    function changeSort(idx) {
        if (sortColIdx === idx) {
            sortOrder *= -1; 
        } else {
            sortColIdx = idx;
            const label = (currentCategory === 'Hitter' ? hCols[idx].id : pCols[idx].id);
            sortOrder = (label === 'EARNED RUN AVERAGE' || label === 'WALKS HITS INNINGS PITCHED' || label === 'RUNS ALLOWED') ? 1 : -1;
        }
        renderTable();
    }

    const hCols = [
        {label: '타율', id: 'BATTING AVERAGE', fix: 3},
        {label: '홈런', id: 'HOME RUNS'},
        {label: '타점', id: 'RUNS BATTED IN'},
        {label: 'OPS', id: 'ON-BASE PERCENTAGE + SLUGGING PERCENTAGE', fix: 3},
        {label: '안타', id: 'HITS'},
        {label: '출루율', id: 'ON-BASE PERCENTAGE', fix: 3}
    ];

    const pCols = [
        {label: '방어율', id: 'EARNED RUN AVERAGE', fix: 2},
        {label: '승', id: 'WINS'},
        {label: 'IP', id: 'INNINGS PITCHED', fix: 1},
        {label: '탈삼진', id: 'STRIKEOUTS'},
        {label: '실점', id: 'RUNS ALLOWED'},
        {label: 'WHIP', id: 'WALKS HITS INNINGS PITCHED', fix: 3}
    ];

    function loadData() {
        const body = document.getElementById('table-body');
        body.innerHTML = '<tr><td colspan="10" style="padding:50px;">데이터 로드 중...</td></tr>';

        const sheetName = (currentYear === '2026') ? `Stats_${currentSeason}` : `Stats_${currentYear}_${currentSeason}`;
        
        fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`)
            .then(r => r.text()).then(d => {
                const data = JSON.parse(d.substr(47).slice(0, -2)).table;
                const headers = data.cols.map(col => (col.label || '').toUpperCase().trim());
                const rows = data.rows;
                const getIdx = (name) => headers.findIndex(h => h === name || h.includes(name));

                allData = rows.map(r => {
                    const gv = (idx) => (idx > -1 && r.c && r.c[idx] && r.c[idx].v !== null) ? r.c[idx].v : '';
                    let first = String(gv(getIdx('FIRST NAME'))).trim();
                    let last = String(gv(getIdx('LAST NAME'))).trim();
                    let full = String(gv(getIdx('PLAYER'))).trim();
                    let name = full || ((first && last && first !== last) ? first + " " + last : first || last || "Unknown");
                    name = name.replace(/null/g, '').trim();

                    return {
                        name: name,
                        team: gv(getIdx('TEAM')) || 'K-League',
                        isPitcher: parseFloat(gv(getIdx('INNINGS PITCHED'))) > 0,
                        hitterStats: hCols.map(c => ({
                            val: parseFloat(gv(getIdx(c.id))) || 0,
                            rank: parseInt(gv(getIdx(c.id + " (RANK)"))) || 999
                        })),
                        pitcherStats: pCols.map(c => ({
                            val: parseFloat(gv(getIdx(c.id))) || 0,
                            rank: parseInt(gv(getIdx(c.id + " (RANK)"))) || 999
                        }))
                    };
                });
                renderTable();
            }).catch(e => { body.innerHTML = '<tr><td colspan="10">기록이 없습니다.</td></tr>'; });
    }

    function renderTable() {
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        if (!allData.length) return;
        head.innerHTML = '';
        body.innerHTML = '';

        let displayData = [...allData];
        if (currentCategory === 'Pitcher') displayData = displayData.filter(d => d.isPitcher);

        displayData.sort((a, b) => {
            const itemA = currentCategory === 'Hitter' ? a.hitterStats[sortColIdx] : a.pitcherStats[sortColIdx];
            const itemB = currentCategory === 'Hitter' ? b.hitterStats[sortColIdx] : b.pitcherStats[sortColIdx];
            
            // 0승 투수 순위 배제 로직
            let rankA = itemA.rank; let rankB = itemB.rank;
            if (currentCategory === 'Pitcher' && pCols[sortColIdx].id === 'WINS') {
                if (itemA.val <= 0) rankA = 999;
                if (itemB.val <= 0) rankB = 999;
            }

            if (rankA !== rankB) return rankA - rankB;
            return (itemA.val - itemB.val) * sortOrder;
        });

        let headerHtml = `<tr><th class="player-info-sticky">공식 순위 / 선수명</th>`;
        const activeCols = currentCategory === 'Hitter' ? hCols : pCols;
        activeCols.forEach((c, idx) => {
            const arrow = (sortColIdx === idx) ? (sortOrder === 1 ? ' ▲' : ' ▼') : '';
            headerHtml += `<th onclick="changeSort(${idx})">${c.label}${arrow}</th>`;
        });
        head.innerHTML = headerHtml + `</tr>`;

        displayData.forEach((d) => {
            const tr = document.createElement('tr');
            const stats = currentCategory === 'Hitter' ? d.hitterStats : d.pitcherStats;
            let officialRank = stats[sortColIdx].rank;
            
            // 0승 투수는 화면상 순위 태그 표시 안함
            if (currentCategory === 'Pitcher' && pCols[sortColIdx].id === 'WINS' && stats[sortColIdx].val <= 0) officialRank = 999;
            const rankDisplay = (officialRank !== 999) ? `<span class="rank-tag">${officialRank}위</span>` : '';

            let statsHtml = '';
            stats.forEach((s, idx) => {
                const activeColDef = currentCategory === 'Hitter' ? hCols[idx] : pCols[idx];
                let v = (activeColDef.fix !== undefined) ? s.val.toFixed(activeColDef.fix) : s.val;
                statsHtml += `<td class="${idx === sortColIdx ? 'val-highlight' : ''}">${v}</td>`;
            });

            tr.innerHTML = `
                <td class="player-info-sticky">
                    <div class="player-info">
                        <span class="p-name">${rankDisplay}${d.name}</span>
                        <span class="p-team">${d.team}</span>
                    </div>
                </td>
                ${statsHtml}
            `;
            body.appendChild(tr);
        });
    }

    function filterTable() {
        const input = document.getElementById('search-input').value.toUpperCase();
        const rows = document.getElementById('table-body').getElementsByTagName('tr');
        for (let i = 0; i < rows.length; i++) {
            const nameCell = rows[i].querySelector('.p-name');
            if (nameCell) {
                const txt = nameCell.textContent || nameCell.innerText;
                rows[i].style.display = txt.toUpperCase().includes(input) ? "" : "none";
            }
        }
    }

    loadData();
</script>
</body>
</html>
