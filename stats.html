    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vancouver K-League | Player Stats</title>
    <style>
        /* 1. 기본 폰트 및 배경 설정 */
        body { font-family: 'Arial', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #003366; color: #ffffff; padding: 1.5rem; text-align: center; }
        nav { background: #333; color: #fff; padding: 0.5rem; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 20px; max-width: 1200px; margin: auto; background: #fff; min-height: 800px; }

        /* 2. 가로 스크롤 컨테이너 (아이폰 15 프로 맥스 대응) */
        .stats-scroll-container {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch; /* 아이폰 부드러운 스크롤 */
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-top: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
            min-width: 900px; /* 표가 찌그러지지 않게 보호 */
        }

        /* 3. 이름 열 왼쪽 고정 (Sticky) */
        .player-info-sticky {
            position: sticky;
            left: 0;
            z-index: 5;
            background-color: #ffffff !important;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1); 
            width: 160px !important;
            min-width: 160px;
            padding-left: 10px !important;
        }

        th.player-info-sticky {
            z-index: 11;
            background-color: #f8f9fa !important;
        }

        /* 4. 기타 디자인 요소 */
        .controls { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; margin-bottom: 20px; gap: 10px; }
        .btn-group { display: flex; border: 1px solid #003366; border-radius: 5px; overflow: hidden; }
        .btn-group button { padding: 8px 20px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-group button.active { background: #003366; color: white; }
        .btn-group button.inactive { background: white; color: #003366; }

        #year-select { padding: 8px; border: 1px solid #003366; border-radius: 5px; font-weight: bold; color: #003366; }
        #search-input { padding: 8px; width: 220px; border: 1px solid #ddd; border-radius: 5px; font-size: 0.9rem; }

        td, th {
            white-space: nowrap; /* 줄바꿈 방지 */
            padding: 12px 8px;
            border: 1px solid #eee;
            text-align: center;
            font-size: 0.85rem;
        }

        .player-info { text-align: left; }
        .p-name { font-weight: bold; display: block; color: #333; }
        .p-team { font-size: 0.75rem; color: #888; }
        .val-highlight { font-weight: bold; color: #d32f2f; font-size: 0.9rem; background-color: #fff9f9; }
        .sort-icon { font-size: 0.7rem; margin-left: 3px; color: #003366; }

        @media (max-width: 600px) { .controls { flex-direction: column; align-items: flex-start; } #search-input { width: 100%; } }
    </style>
</head>
<body>

<header>
    <h1>Vancouver K-League Stats</h1>
    <p>Complete Player Performance Database</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="schedule.html">Full Schedule</a>
</nav>

<div class="container">
    <div class="controls">
        <select id="year-select" onchange="changeYear(this.value)">
            <option value="2026" selected>2026 Season</option>
            <option value="2025">2025 Season</option>
        </select>

        <div class="btn-group">
            <button id="btn-Reg" class="active" onclick="switchSeason('Reg')">Regular Season</button>
            <button id="btn-Post" class="inactive" onclick="switchSeason('Post')">Post Season</button>
        </div>
        <div class="btn-group">
            <button id="btn-Hitter" class="active" onclick="switchCategory('Hitter')">Batting</button>
            <button id="btn-Pitcher" class="inactive" onclick="switchCategory('Pitcher')">Pitching</button>
        </div>
        <input type="text" id="search-input" placeholder="Search player name..." onkeyup="filterTable()">
    </div>

    <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">* Click on headers (AVG, HR, etc.) to sort the rankings.</p>

    <div style="overflow-x: auto; border: 1px solid #ddd; border-radius: 8px;">
        <table id="stats-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const sheetId = '1TGVBZmql3c0jwu1DPGLH3fzqU5m3IjqCVuD2XX2i1zc';
    let currentYear = '2026';
    let currentSeason = 'Reg';
    let currentCategory = 'Hitter';
    let allData = [];
    let sortColIdx = 0; 
    let sortOrder = -1; 

    function changeYear(y) {
        currentYear = y;
        loadData();
    }

    function switchSeason(s) {
        currentSeason = s;
        document.getElementById('btn-Reg').className = (s === 'Reg' ? 'active' : 'inactive');
        document.getElementById('btn-Post').className = (s === 'Post' ? 'active' : 'inactive');
        loadData();
    }

    function switchCategory(c) {
        currentCategory = c;
        sortColIdx = 0; 
        sortOrder = (c === 'Pitcher') ? 1 : -1;
        document.getElementById('btn-Hitter').className = (c === 'Hitter' ? 'active' : 'inactive');
        document.getElementById('btn-Pitcher').className = (c === 'Pitcher' ? 'active' : 'inactive');
        renderTable();
    }

    function changeSort(idx) {
        if (sortColIdx === idx) {
            sortOrder *= -1; 
        } else {
            sortColIdx = idx;
            // Lower is better for ERA(0) and WHIP(5)
            sortOrder = (currentCategory === 'Pitcher' && (idx === 0 || idx === 5)) ? 1 : -1;
        }
        renderTable();
    }

    function loadData() {
        // 연도에 따른 시트명 동적 생성
        const sheetName = (currentYear === '2026') ? `Stats_${currentSeason}` : `Stats_${currentYear}_${currentSeason}`;
        
        fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`)
            .then(r => r.text()).then(d => {
                const data = JSON.parse(d.substr(47).slice(0, -2)).table;
                const headers = data.cols.map(col => (col.label || '').toUpperCase().trim());
                const rows = data.rows;

                const getIdx = (names) => headers.findIndex(h => names.some(n => h === n || h.includes(n)));
                
                const lnIdx = getIdx(['LAST NAME', 'PLAYER', 'NAME']);
                const fnIdx = getIdx(['FIRST NAME']);
                const teamIdx = getIdx(['TEAM']);
                const ipIdx = getIdx(['INNINGS PITCHED', 'IP', 'INN']);

                // [English Labels]
                const hCols = [
                    {label: 'AVG', id: 'AVG', idx: getIdx(['BATTING AVERAGE', 'AVG', 'BA']), fix: 3},
                    {label: 'HR', id: 'HR', idx: getIdx(['HOME RUNS', 'HR'])},
                    {label: 'RBI', id: 'RBI', idx: getIdx(['RUNS BATTED IN', 'RBI'])},
                    {label: 'OPS', id: 'OPS', idx: getIdx(['ON-BASE PERCENTAGE + SLUGGING PERCENTAGE', 'OPS']), fix: 3},
                    {label: 'H', id: 'H', idx: getIdx(['HITS', 'H'])},
                    {label: 'OBP', id: 'OBP', idx: getIdx(['ON-BASE PERCENTAGE', 'OBP']), fix: 3}
                ];

                const pCols = [
                    {label: 'ERA', id: 'ERA', idx: getIdx(['EARNED RUN AVERAGE', 'ERA']), fix: 2},
                    {label: 'W', id: 'W', idx: getIdx(['WINS', 'W'])},
                    {label: 'IP', id: 'IP', idx: ipIdx, fix: 1},
                    {label: 'SO', id: 'SO', idx: getIdx(['STRIKEOUTS', 'SO', 'K'])},
                    {label: 'R', id: 'R', idx: getIdx(['RUNS ALLOWED', 'R'])},
                    {label: 'WHIP', id: 'WHIP', idx: getIdx(['WALKS HITS INNINGS PITCHED', 'WHIP']), fix: 3}
                ];

                // ⭐ 강화된 이름 결합 로직 (Same as Korean version)
                allData = rows.map(r => {
    // 값을 가져오는 함수: 숫자인지 문자인지 상관없이 안전하게 문자열로 변환
    const gv = (idx) => {
        if (idx > -1 && r.c && r.c[idx] && r.c[idx].v !== null) {
            return String(r.c[idx].v).trim();
        }
        return '';
    };

    // [핵심] 컬럼 이름과 상관없이 데이터가 들어있을 법한 모든 곳을 뒤집니다.
    let first = gv(fnIdx); // First Name 컬럼
    let last = gv(lnIdx);  // Last Name 컬럼
    let fallback1 = gv(0); // 엑셀 A열 (실제 이름이 여기 있을 확률이 높음)
    let fallback2 = gv(1); // 엑셀 B열

    let finalName = "";

    // 1. 성과 이름이 따로 잘 들어있는 경우 (2026년식)
    if (first && last && first !== last) {
        finalName = (last.includes(first)) ? last : first + " " + last;
    } 
    // 2. 한쪽 컬럼에만 이름이 있는 경우 (2025년식)
    else if (first || last) {
        finalName = first || last;
    } 
    // 3. 인덱스로 못 찾았을 때 A열이나 B열에서 강제로 가져오기 (Unknown 방지)
    else {
        finalName = fallback2 || fallback1 || "Unknown Player";
    }

    // "null" 글자 제거 및 정리
    finalName = finalName.replace(/null/g, '').trim();

    // 팀 정보 가져오기
    let teamName = (teamIdx > -1 && r.c[teamIdx]?.v) ? r.c[teamIdx].v : 'K-League';

    // OPS 계산 로직
    const calculateOps = () => {
        const opsIdx = getIdx(['ON-BASE PERCENTAGE + SLUGGING PERCENTAGE', 'OPS']);
        if (opsIdx > -1 && gv(opsIdx) !== '') return parseFloat(gv(opsIdx)) || 0;
        const obp = parseFloat(gv(getIdx(['ON-BASE PERCENTAGE', 'OBP']))) || 0;
        const slg = parseFloat(gv(getIdx(['SLUGGING PERCENTAGE', 'SLG']))) || 0;
        return obp + slg;
    };

    return {
        name: finalName,
        team: teamName,
        isPitcher: (ipIdx > -1 && parseFloat(gv(ipIdx))) > 0,
        hitterStats: hCols.map(c => {
            let val = (c.id === 'OPS') ? calculateOps() : parseFloat(gv(c.idx));
            return {val: val || 0, label: c.label, fix: c.fix};
        }),
        pitcherStats: pCols.map(c => ({val: parseFloat(gv(c.idx)) || 0, label: c.label, fix: c.fix}))
    };
});
                renderTable();
            }).catch(e => console.error("Data loading error:", e));
    }

    function renderTable() {
    const head = document.getElementById('table-head');
    const body = document.getElementById('table-body');
    if (!allData.length) return;
    head.innerHTML = '';
    body.innerHTML = '';

    // 표를 감싸는 부모 요소에 스크롤 클래스 부여
    const tableWrapper = document.getElementById('stats-table').parentElement;
    tableWrapper.className = 'stats-scroll-container';

    let displayData = [...allData];
    if (currentCategory === 'Pitcher') {
        displayData = displayData.filter(d => d.isPitcher);
        displayData.sort((a,b) => (a.pitcherStats[sortColIdx].val - b.pitcherStats[sortColIdx].val) * sortOrder);
    } else {
        displayData.sort((a,b) => (a.hitterStats[sortColIdx].val - b.hitterStats[sortColIdx].val) * sortOrder);
    }

    // 헤더 생성 (이름 열에 sticky 클래스 적용)
    const hTr = document.createElement('tr');
    let headerHtml = `<th class="player-info-sticky">Rank / Player</th>`;
    const activeCols = currentCategory === 'Hitter' ? displayData[0].hitterStats : displayData[0].pitcherStats;
    
    activeCols.forEach((c, idx) => {
        const arrow = (sortColIdx === idx) ? (sortOrder === 1 ? ' ▲' : ' ▼') : '';
        headerHtml += `<th onclick="changeSort(${idx})">${c.label}<span class="sort-icon">${arrow}</span></th>`;
    });
    hTr.innerHTML = headerHtml;
    head.appendChild(hTr);

    // 데이터 행 생성
    displayData.forEach((d, i) => {
        const tr = document.createElement('tr');
        let statsHtml = '';
        const stats = currentCategory === 'Hitter' ? d.hitterStats : d.pitcherStats;
        
        stats.forEach((s, idx) => {
            let v = s.val;
            if (s.fix !== undefined) v = v.toFixed(s.fix);
            statsHtml += `<td class="${idx === sortColIdx ? 'val-highlight' : ''}">${v}</td>`;
        });

        // 순위와 이름을 하나의 고정 열로 합쳐서 출력
        tr.innerHTML = `
            <td class="player-info-sticky">
                <div style="display:flex; align-items:center; gap:10px;">
                    <span style="font-size:0.75rem; color:#999; font-weight:bold; min-width:15px;">${i+1}</span>
                    <div class="player-info">
                        <span class="p-name">${d.name}</span>
                        <span class="p-team">${d.team}</span>
                    </div>
                </div>
            </td>
            ${statsHtml}
        `;
        body.appendChild(tr);
    });
}

    function filterTable() {
        const input = document.getElementById('search-input').value.toUpperCase();
        const rows = document.getElementById('table-body').getElementsByTagName('tr');
        for (let i = 0; i < rows.length; i++) {
            const nameCell = rows[i].getElementsByClassName('p-name')[0];
            if (nameCell) {
                const txtValue = nameCell.textContent || nameCell.innerText;
                rows[i].style.display = txtValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
            }
        }
    }

    loadData();
</script>
</body>
</html>
