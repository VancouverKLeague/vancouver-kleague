<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vancouver K-League | Player Stats</title>
    <style>
        body { font-family: 'Arial', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f4f4f4; }
        header { background: #003366; color: #ffffff; padding: 1.5rem; text-align: center; }
        nav { background: #333; color: #fff; padding: 10px; text-align: center; }
        nav a { color: #fff; margin: 0 15px; text-decoration: none; font-weight: bold; }
        .container { padding: 15px; max-width: 1200px; margin: auto; background: #fff; min-height: 100vh; }
        .controls { background: #eee; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; justify-content: center; }
        .btn-group { display: flex; gap: 2px; }
        select, button, #search-input { padding: 8px 12px; border-radius: 5px; border: 1px solid #ccc; font-weight: bold; cursor: pointer; }
        button.active { background: #003366; color: white; border-color: #003366; }
        button.inactive { background: white; color: #333; }
        .stats-scroll-container { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; border: 1px solid #ddd; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 950px; }
        .player-info-sticky { position: sticky; left: 0; z-index: 5; background-color: #ffffff !important; box-shadow: 2px 0 5px rgba(0,0,0,0.1); width: 180px !important; min-width: 180px; padding-left: 10px !important; }
        th.player-info-sticky { z-index: 11; background-color: #f8f9fa !important; }
        td, th { white-space: nowrap; padding: 12px 8px; border: 1px solid #eee; text-align: center; font-size: 0.85rem; }
        th { background: #f8f9fa; cursor: pointer; }
        .val-highlight { color: #d32f2f; font-weight: bold; background-color: #fff9f9; }
        .player-info { display: flex; flex-direction: column; text-align: left; }
        .p-name { font-weight: bold; color: #003366; }
        .p-team { font-size: 0.75rem; color: #888; }
        .rank-tag { font-size: 0.7rem; color: #d32f2f; font-weight: 900; background: #ffeeee; padding: 1px 4px; border-radius: 4px; margin-right: 5px; }
    </style>
</head>
<body>

<header>
    <h1>Vancouver K-League Stats</h1>
    <p>Complete Player Performance Database</p>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="schedule.html">Full Schedule</a>
</nav>

<div class="container">
    <div class="controls">
        <select id="year-select" onchange="changeYear(this.value)">
            <option value="2026" selected>2026 Season</option>
            <option value="2025">2025 Season</option>
        </select>
        <div class="btn-group">
            <button id="btn-Reg" class="active" onclick="switchSeason('Reg')">Regular Season</button>
            <button id="btn-Post" class="inactive" onclick="switchSeason('Post')">Post Season</button>
        </div>
        <div class="btn-group">
            <button id="btn-Hitter" class="active" onclick="switchCategory('Hitter')">Batting</button>
            <button id="btn-Pitcher" class="inactive" onclick="switchCategory('Pitcher')">Pitching</button>
        </div>
        <input type="text" id="search-input" placeholder="Search Player..." onkeyup="filterTable()">
    </div>

    <p style="font-size: 0.8rem; color: #666; margin-bottom: 10px;">
        * Players with 0 records in cumulative categories are excluded from rankings. Rankings are updated dynamically based on sorted values.
    </p>

    <div class="stats-scroll-container">
        <table id="stats-table">
            <thead id="table-head"></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>
</div>

<script>
    const sheetId = '1TGVBZmql3c0jwu1DPGLH3fzqU5m3IjqCVuD2XX2i1zc';
    let currentYear = '2026';
    let currentSeason = 'Reg';
    let currentCategory = 'Hitter';
    let allData = [];
    let sortColIdx = 0; 

    function changeYear(y) { currentYear = y; loadData(); }
    function switchSeason(s) {
        currentSeason = s;
        document.getElementById('btn-Reg').className = (s === 'Reg' ? 'active' : 'inactive');
        document.getElementById('btn-Post').className = (s === 'Post' ? 'active' : 'inactive');
        loadData();
    }
    function switchCategory(c) {
        currentCategory = c;
        sortColIdx = 0; 
        document.getElementById('btn-Hitter').className = (c === 'Hitter' ? 'active' : 'inactive');
        document.getElementById('btn-Pitcher').className = (c === 'Pitcher' ? 'active' : 'inactive');
        renderTable();
    }
    function changeSort(idx) { sortColIdx = idx; renderTable(); }

    function getOrdinal(n) {
        let s = ["th", "st", "nd", "rd"], v = n % 100;
        return n + (s[(v - 20) % 10] || s[v] || s[0]);
    }

    const hCols = [
        {label: 'AVG', id: 'BATTING AVERAGE', fix: 3},
        {label: 'HR', id: 'HOME RUNS'},
        {label: 'RBI', id: 'RUNS BATTED IN'},
        {label: 'OPS', id: 'ON-BASE PERCENTAGE + SLUGGING PERCENTAGE', fix: 3},
        {label: 'H', id: 'HITS'},
        {label: 'OBP', id: 'ON-BASE PERCENTAGE', fix: 3}
    ];
    const pCols = [
        {label: 'ERA', id: 'EARNED RUN AVERAGE', fix: 2},
        {label: 'W', id: 'WINS'},
        {label: 'IP', id: 'INNINGS PITCHED', fix: 1},
        {label: 'SO', id: 'STRIKEOUTS'},
        {label: 'R', id: 'RUNS ALLOWED'},
        {label: 'WHIP', id: 'WALKS HITS INNINGS PITCHED', fix: 3},
        {label: 'H', id: 'HITS ALLOWED'}
    ];

    function loadData() {
        const body = document.getElementById('table-body');
        body.innerHTML = '<tr><td colspan="10" style="padding:50px;">Loading data...</td></tr>';
        const sheetName = (currentYear === '2026') ? `Stats_${currentSeason}` : `Stats_${currentYear}_${currentSeason}`;
        
        fetch(`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`)
            .then(r => r.text()).then(d => {
                const data = JSON.parse(d.substr(47).slice(0, -2)).table;
                const headers = data.cols.map(col => (col.label || '').toUpperCase().trim());
                const rows = data.rows;
                const getIdx = (name) => headers.findIndex(h => h === name || h.includes(name));

                allData = rows.map(r => {
                    const gv = (idx) => (idx > -1 && r.c && r.c[idx] && r.c[idx].v !== null) ? r.c[idx].v : '';
                    let first = String(gv(getIdx('FIRST NAME'))).trim();
                    let last = String(gv(getIdx('LAST NAME'))).trim();
                    let full = String(gv(getIdx('PLAYER'))).trim();
                    let name = full || ((first && last && first !== last) ? first + " " + last : first || last || "Unknown");
                    
                    return {
                        name: name.replace(/null/g, '').trim(),
                        team: gv(getIdx('TEAM')) || 'K-League',
                        ip: parseFloat(gv(getIdx('INNINGS PITCHED'))) || 0,
                        hitterStats: hCols.map(c => ({ val: parseFloat(gv(getIdx(c.id))) || 0 })),
                        pitcherStats: pCols.map(c => {
                            // Link 'HITS ALLOWED' column to 'HITS' data in the sheet
                            const searchId = (c.id === 'HITS ALLOWED') ? 'HITS' : c.id;
                            return { val: parseFloat(gv(getIdx(searchId))) || 0 };
                        })
                    };
                });
                renderTable();
            });
    }

    function renderTable() {
        const head = document.getElementById('table-head');
        const body = document.getElementById('table-body');
        if (!allData.length) return;
        head.innerHTML = ''; body.innerHTML = '';

        let displayData = [...allData];
        if (currentCategory === 'Pitcher') displayData = displayData.filter(d => d.ip > 0);

        const activeCols = currentCategory === 'Hitter' ? hCols : pCols;
        const colId = activeCols[sortColIdx].id;
        const lowIsBetter = ['EARNED RUN AVERAGE', 'WALKS HITS INNINGS PITCHED', 'RUNS ALLOWED', 'HITS ALLOWED'];

        // Core Sorting by actual value
        displayData.sort((a, b) => {
            const valA = currentCategory === 'Hitter' ? a.hitterStats[sortColIdx].val : a.pitcherStats[sortColIdx].val;
            const valB = currentCategory === 'Hitter' ? b.hitterStats[sortColIdx].val : b.pitcherStats[sortColIdx].val;
            
            if (valA !== valB) {
                if (lowIsBetter.includes(colId)) return valA - valB; // Ascending
                return valB - valA; // Descending (IP, AVG, HR, etc.)
            }
            return 0;
        });

        let headerHtml = `<tr><th class="player-info-sticky">Rank / Player</th>`;
        activeCols.forEach((c, idx) => {
            headerHtml += `<th onclick="changeSort(${idx})">${c.label}${sortColIdx === idx ? ' ▼' : ''}</th>`;
        });
        head.innerHTML = headerHtml + `</tr>`;

        // Dynamic ranking logic based on sorted order
        let runningRank = 1;
        displayData.forEach((d) => {
            const tr = document.createElement('tr');
            const stats = currentCategory === 'Hitter' ? d.hitterStats : d.pitcherStats;
            const val = stats[sortColIdx].val;

            // Define categories where 0 should not be ranked (cumulative positive stats)
            const cumulativePositive = ['HOME RUNS', 'RUNS BATTED IN', 'WINS', 'STRIKEOUTS', 'HITS'];
            
            let rankDisplay = '';
            if (lowIsBetter.includes(colId)) {
                // For ERA, WHIP, R, H: 0 is the best score, so rank it
                rankDisplay = `<span class="rank-tag">${getOrdinal(runningRank++)}</span>`;
            } else if (cumulativePositive.includes(colId)) {
                // For HR, Wins, etc: rank only if value > 0
                if (val > 0) rankDisplay = `<span class="rank-tag">${getOrdinal(runningRank++)}</span>`;
            } else {
                // For AVG, IP, OBP, etc: rank all active players
                rankDisplay = `<span class="rank-tag">${getOrdinal(runningRank++)}</span>`;
            }

            let statsHtml = '';
            stats.forEach((s, idx) => {
                const activeColDef = activeCols[idx];
                statsHtml += `<td class="${idx === sortColIdx ? 'val-highlight' : ''}">${(activeColDef.fix !== undefined) ? s.val.toFixed(activeColDef.fix) : s.val}</td>`;
            });

            tr.innerHTML = `<td class="player-info-sticky"><div class="player-info"><span class="p-name">${rankDisplay}${d.name}</span><span class="p-team">${d.team}</span></div></td>${statsHtml}`;
            body.appendChild(tr);
        });
    }

    function filterTable() {
        const input = document.getElementById('search-input').value.toUpperCase();
        const rows = document.getElementById('table-body').getElementsByTagName('tr');
        for (let i = 0; i < rows.length; i++) {
            const nameCell = rows[i].querySelector('.p-name');
            if (nameCell) {
                const txt = nameCell.textContent || nameCell.innerText;
                rows[i].style.display = txt.toUpperCase().includes(input) ? "" : "none";
            }
        }
    }
    loadData();
</script>
</body>
</html>
